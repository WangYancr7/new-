
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大众性能车购车平台 | Volkswagen Performance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
        }

        /* 导航栏 */
        .navbar {
            background: rgba(0, 0, 0, 0.9);
            padding: 1rem 2rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }

        .logo h1 {
            font-size: 1.5rem;
            background: linear-gradient(45deg, #00b4d8, #0077b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #00b4d8;
        }

        /* 英雄区域 */
        .hero {
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://bailian-bmp-pre.oss-cn-hangzhou.aliyuncs.com/public/system_agent/PlaceHolder.png');
            background-size: cover;
            background-position: center;
            margin-top: 60px;
        }

        .hero-content h2 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .hero-content p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: #ccc;
        }

        .btn {
            padding: 1rem 2.5rem;
            background: linear-gradient(45deg, #00b4d8, #0077b6);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 180, 216, 0.4);
        }

        /* 筛选区域 */
        .filter-section {
            padding: 3rem 2rem;
            background: rgba(255, 255, 255, 0.05);
        }

        .filter-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            border-radius: 25px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: #00b4d8;
            border-color: #00b4d8;
        }

        /* 车型展示 */
        .cars-section {
            padding: 4rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 3rem;
            background: linear-gradient(45deg, #00b4d8, #0077b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .cars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .car-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .car-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 180, 216, 0.3);
        }

        .car-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .car-info {
            padding: 1.5rem;
        }

        .car-name {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #00b4d8;
        }

        .car-price {
            font-size: 1.3rem;
            color: #ffd700;
            margin-bottom: 1rem;
        }

        .car-specs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .spec-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: #ccc;
        }

        .spec-icon {
            color: #00b4d8;
        }

        .car-actions {
            display: flex;
            gap: 1rem;
        }

        .btn-outline {
            flex: 1;
            padding: 0.8rem;
            background: transparent;
            border: 2px solid #00b4d8;
            color: #00b4d8;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-outline:hover {
            background: #00b4d8;
            color: #fff;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 20px;
            max-width: 900px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 2rem;
            color: #fff;
            cursor: pointer;
            background: none;
            border: none;
        }

        .modal-body {
            padding: 2rem;
        }

        .modal-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 2.5rem;
            color: #00b4d8;
            margin-bottom: 0.5rem;
        }

        .modal-price {
            font-size: 2rem;
            color: #ffd700;
            margin-bottom: 1.5rem;
        }

        .modal-specs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .modal-spec {
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
        }

        .modal-spec-label {
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 0.5rem;
        }

        .modal-spec-value {
            font-size: 1.3rem;
            color: #00b4d8;
            font-weight: bold;
        }

        .modal-description {
            line-height: 1.8;
            color: #ddd;
            margin-bottom: 2rem;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
        }

        .btn-large {
            flex: 1;
            padding: 1.2rem;
            font-size: 1.2rem;
        }

        /* 联系表单 */
        .contact-form {
            display: none;
            margin-top: 2rem;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #00b4d8;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #00b4d8;
        }

        /* 页脚 */
        .footer {
            background: rgba(0, 0, 0, 0.9);
            padding: 3rem 2rem;
            text-align: center;
            margin-top: 4rem;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: #ccc;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: #00b4d8;
        }

        .copyright {
            color: #666;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .hero-content h2 {
                font-size: 2.5rem;
            }

            .cars-grid {
                grid-template-columns: 1fr;
            }

            .modal-specs {
                grid-template-columns: 1fr;
            }

            .modal-actions {
                flex-direction: column;
            }
        }

        /* 动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .car-card {
            animation: fadeIn 0.5s ease-out;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="logo">
            <img src="https://bailian-bmp-pre.oss-cn-hangzhou.aliyuncs.com/public/system_agent/PlaceHolder.png" alt="VW Logo">
            <h1>大众性能车</h1>
        </div>
        <ul class="nav-links">
            <li><a href="#home">首页</a></li>
            <li><a href="#cars">车型</a></li>
            <li><a href="#about">关于</a></li>
            <li><a href="#contact">联系</a></li>
        </ul>
    </nav>

    <!-- 英雄区域 -->
    <section class="hero" id="home">
        <div class="hero-content">
            <h2>驾驭激情 性能至上</h2>
            <p>探索大众全系高性能车型，体验德系工艺与强劲动力的完美结合</p>
            <button class="btn" id="exploreBtn">探索车型</button>
        </div>
    </section>

    <!-- 筛选区域 -->
    <section class="filter-section">
        <div class="filter-container">
            <button class="filter-btn active" data-filter="all">全部车型</button>
            <button class="filter-btn" data-filter="hatchback">两厢性能</button>
            <button class="filter-btn" data-filter="sedan">轿跑性能</button>
            <button class="filter-btn" data-filter="suv">SUV 性能</button>
            <button class="filter-btn" data-filter="electric">电动性能</button>
        </div>
    </section>

    <!-- 车型展示 -->
    <section class="cars-section" id="cars">
        <h2 class="section-title">大众性能车系</h2>
        <div class="cars-grid" id="carsGrid">
            <!-- 车辆卡片将通过 JavaScript 动态生成 -->
        </div>
    </section>

    <!-- 模态框 -->
    <div class="modal" id="carModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">&times;</button>
            <div class="modal-body">
                <img class="modal-image" id="modalImage" src="https://bailian-bmp-pre.oss-cn-hangzhou.aliyuncs.com/public/system_agent/PlaceHolder.png" alt="Car Image">
                <h3 class="modal-title" id="modalTitle"></h3>
                <p class="modal-price" id="modalPrice"></p>
                <div class="modal-specs" id="modalSpecs"></div>
                <p class="modal-description" id="modalDescription"></p>
                <div class="modal-actions">
                    <button class="btn btn-large" id="testDriveBtn">预约试驾</button>
                    <button class="btn-outline btn-large" id="contactBtn">咨询购买</button>
                </div>
                <div class="contact-form" id="contactForm">
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" id="contactName" placeholder="请输入您的姓名">
                    </div>
                    <div class="form-group">
                        <label>联系电话</label>
                        <input type="tel" id="contactPhone" placeholder="请输入您的联系电话">
                    </div>
                    <div class="form-group">
                        <label>留言</label>
                        <textarea id="contactMessage" rows="4" placeholder="请输入您想了解的内容"></textarea>
                    </div>
                    <button class="btn btn-large" id="submitContact">提交咨询</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer" id="contact">
        <div class="footer-content">
            <div class="footer-links">
                <a href="#">关于我们</a>
                <a href="#">车型大全</a>
                <a href="#">经销商查询</a>
                <a href="#">金融服务</a>
                <a href="#">售后服务</a>
                <a href="#">隐私政策</a>
            </div>
            <p class="copyright">© 2024 大众性能车购车平台。本网站为演示页面，图片均为占位图。</p>
        </div>
    </footer>

    <script>
        // 大众性能车数据
        const carsData = [
            {
                id: 1,
                name: "高尔夫 GTI",
                category: "hatchback",
                price: "229,800 元起",
                image: "https://bailian-bmp-pre.oss-cn-hangzhou.aliyuncs.com/public/system_agent/PlaceHolder.png",
                specs: {
                    engine: "2.0T EA888",
                    power: "220 马力",
                    torque: "350 牛·米",
                    acceleration: "6.7 秒",
                    transmission: "7 速 DSG",
                    drive: "前驱"
                },
                description: "高尔夫 GTI 是 hot hatch 的开创者，历经八代传承，将驾驶乐趣与日常实用性完美融合。搭载经典 EA888 2.0T 发动机，配合精准调校的底盘，带来纯粹的驾驶体验。"
            },
            {
                id: 2,
                name: "高尔夫 R",
                category: "hatchback",
                price: "399,800 元起",
                image: "https://bailian-bmp-pre.oss-cn-hangzhou.aliyuncs.com/public/system_agent/PlaceHolder.png",
                specs: {
                    engine: "2.0T EA888 Evo4",
                    power: "320 马力",
                    torque: "420 牛·米",
                    acceleration: "4.7 秒",
                    transmission: "7 速 DSG",
                    drive: "4MOTION 四驱"
                },
                description: "高尔夫 R 是大众性能车的巅峰之作，搭载最强 EA888 发动机，配合 4MOTION 四驱系统，百公里加速仅需 4.7 秒。赛道基因，街道合法。"
            },
            {
                id: 3,
                name: "Polo GTI",
                category: "hatchback",
                price: "139,800 元起",
                image: "https://bailian-bmp-pre.oss-cn-hangzhou.aliyuncs.com/public/system_agent/PlaceHolder.png",
                specs: {
                    engine: "1.5T EA211",
                    power: "150 马力",
                    torque: "250 牛·米",
                    acceleration: "8.3 秒",
                    transmission: "7 速 DSG",
                    drive: "前驱"
                },
                description: "Polo GTI 是小钢炮的代表，紧凑车身蕴含巨大能量。适合城市穿梭，同时保留 GTI 家族的驾驶乐趣，是年轻人的第一台性能车。"
            },
            {
                id: 4,
                name: "Arteon R",
                category: "sedan",
                price: "449,800 元起",
                image: "https://bailian-bmp-pre.oss-cn-hangzhou.aliyuncs.com/public/system_agent/PlaceHolder.png",
                specs: {
                    engine: "2.0T EA888",
                    power: "320 马力",
                    torque: "420 牛·米",
                    acceleration: "5.6 秒",
                    transmission: "7 速 DSG",
                    drive: "4MOTION 四驱"
                },
                description: "Arteon R 将优雅轿跑与极致性能完美结合。无框车门设计，溜背造型，配合 R 性能套件，是商务与激情的双重选择。"
            },
            {
                id: 5,
                name: "Tiguan R",
                category: "suv",
                price: "489,800 元起",
                image: "https://bailian-bmp-pre.oss-cn-hangzhou.aliyuncs.com/public/system_agent/PlaceHolder.png",
                specs: {
                    engine: "2.0T EA888",
                    power: "320 马力",
                    torque: "420 牛·米",
                    acceleration: "5.5 秒",
                    transmission: "7 速 DSG",
                    drive: "4MOTION 四驱"
                },
                description: "Tiguan R 是高性能 SUV 的标杆，将实用性、通过性与赛道性能融为一体。适合家庭使用，也能在赛道上展现实力。"
            },
            {
                id: 6,
                name: "Touareg R",
                category: "suv",
                price: "689,800 元起",
                image: "https://bailian-bmp-pre.oss-cn-hangzhou.aliyuncs.com/public/system_agent/PlaceHolder.png",
                specs: {
                    engine: "3.0T V6 插电混动",
                    power: "462 马力",
                    torque: "700 牛·米",
                    acceleration: "5.1 秒",
                    transmission: "8 速 Tiptronic",
                    drive: "4MOTION 四驱"
                },
                description: "Touareg R 是大众旗舰性能 SUV，搭载 3.0T V6 插电混动系统，兼顾强劲动力与燃油经济性。豪华配置，顶级性能。"
            },
            {
                id: 7,
                name: "ID.4 GTX",
                category: "electric",
                price: "279,800 元起",
                image: "https://bailian-bmp-pre.oss-cn-hangzhou.aliyuncs.com/public/system_agent/PlaceHolder.png",
                specs: {
                    engine: "双电机",
                    power: "299 马力",
                    torque: "460 牛·米",
                    acceleration: "6.2 秒",
                    transmission: "单速变速",
                    drive: "双电机四驱"
                },
                description: "ID.4 GTX 是大众电动性能的代表，双电机四驱系统带来瞬间扭矩输出。零排放，高性能，代表未来出行方向。"
            },
            {
                id: 8,
                name: "ID.5 GTX",
                category: "electric",
                price: "299,800 元起",
                image: "https://bailian-bmp-pre.oss-cn-hangzhou.aliyuncs.com/public/system_agent/PlaceHolder.png",
                specs: {
                    engine: "双电机",
                    power: "299 马力",
                    torque: "460 牛·米",
                    acceleration: "6.3 秒",
                    transmission: "单速变速",
                    drive: "双电机四驱"
                },
                description: "ID.5 GTX 采用轿跑 SUV 设计，溜背造型更具运动感。同样搭载 GTX 性能系统，是电动时代的性能美学典范。"
            }
        ];

        // 当前选中的车辆
        let currentCar = null;

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            renderCars(carsData);
            setupEventListeners();
        });

        // 渲染车辆卡片
        function renderCars(cars) {
            const grid = document.getElementById('carsGrid');
            grid.innerHTML = '';

            cars.forEach(car => {
                const card = document.createElement('div');
                card.className = 'car-card';
                card.dataset.id = car.id;
                card.dataset.category = car.category;

                card.innerHTML = `
                    <img class="car-image" src="${car.image}" alt="${car.name}">
                    <div class="car-info">
                        <h3 class="car-name">${car.name}</h3>
                        <p class="car-price">${car.price}</p>
                        <div class="car-specs">
                            <div class="spec-item">
                                <span class="spec-icon">⚡</span>
                                <span>${car.specs.power}</span>
                            </div>
                            <div class="spec-item">
                                <span class="spec-icon">🚀</span>
                                <span>${car.specs.acceleration}</span>
                            </div>
                            <div class="spec-item">
                                <span class="spec-icon">🔧</span>
                                <span>${car.specs.engine}</span>
                            </div>
                            <div class="spec-item">
                                <span class="spec-icon">🛞</span>
                                <span>${car.specs.drive}</span>
                            </div>
                        </div>
                        <div class="car-actions">
                            <button class="btn-outline" data-action="details">查看详情</button>
                            <button class="btn-outline" data-action="contact">咨询</button>
                        </div>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        // 设置事件监听器
        function setupEventListeners() {
            // 探索按钮
            document.getElementById('exploreBtn').addEventListener('click', function() {
                document.getElementById('cars').scrollIntoView({ behavior: 'smooth' });
            });

            // 筛选按钮
            const filterBtns = document.querySelectorAll('.filter-btn');
            filterBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');

                    const filter = this.dataset.filter;
                    if (filter === 'all') {
                        renderCars(carsData);
                    } else {
                        const filtered = carsData.filter(car => car.category === filter);
                        renderCars(filtered);
                    }
                });
            });

            // 车辆卡片点击事件（事件委托）
            document.getElementById('carsGrid').addEventListener('click', function(e) {
                const card = e.target.closest('.car-card');
                if (!card) return;

                const carId = parseInt(card.dataset.id);
                currentCar = carsData.find(car => car.id === carId);

                if (e.target.dataset.action === 'details' || e.target.dataset.action === 'contact') {
                    openModal(currentCar);
                    if (e.target.dataset.action === 'contact') {
                        document.getElementById('contactForm').style.display = 'block';
                    }
                } else if (e.target.closest('.car-actions')) {
                    // 点击了操作按钮，已在上面处理
                } else {
                    // 点击卡片其他区域，打开详情
                    openModal(currentCar);
                }
            });

            // 模态框关闭
            document.getElementById('modalClose').addEventListener('click', function() {
                closeModal();
            });

            // 点击模态框外部关闭
            document.getElementById('carModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeModal();
                }
            });

            // 预约试驾
            document.getElementById('testDriveBtn').addEventListener('click', function() {
                document.getElementById('contactForm').style.display = 'block';
                document.getElementById('contactMessage').value = `我想预约${currentCar.name}的试驾`;
                document.getElementById('contactMessage').scrollIntoView({ behavior: 'smooth' });
            });

            // 咨询购买
            document.getElementById('contactBtn').addEventListener('click', function() {
                document.getElementById('contactForm').style.display = 'block';
                document.getElementById('contactMessage').value = `我想咨询${currentCar.name}的购买事宜`;
                document.getElementById('contactMessage').scrollIntoView({ behavior: 'smooth' });
            });

            // 提交联系表单
            document.getElementById('submitContact').addEventListener('click', function() {
                const name = document.getElementById('contactName').value.trim();
                const phone = document.getElementById('contactPhone').value.trim();
                const message = document.getElementById('contactMessage').value.trim();

                if (!name || !phone) {
                    alert('请填写姓名和联系电话');
                    return;
                }

                alert(`感谢您的咨询！\n姓名：${name}\n电话：${phone}\n需求：${message}\n\n我们的销售顾问将在 24 小时内与您联系。`);
                closeModal();
            });

            // ESC 键关闭模态框
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeModal();
                }
            });
        }

        // 打开模态框
        function openModal(car) {
            document.getElementById('modalImage').src = car.image;
            document.getElementById('modalTitle').textContent = car.name;
            document.getElementById('modalPrice').textContent = car.price;
            document.getElementById('modalDescription').textContent = car.description;

            const specsContainer = document.getElementById('modalSpecs');
            specsContainer.innerHTML = `
                <div class="modal-spec">
                    <div class="modal-spec-label">发动机</div>
                    <div class="modal-spec-value">${car.specs.engine}</div>
                </div>
                <div class="modal-spec">
                    <div class="modal-spec-label">最大功率</div>
                    <div class="modal-spec-value">${car.specs.power}</div>
                </div>
                <div class="modal-spec">
                    <div class="modal-spec-label">最大扭矩</div>
                    <div class="modal-spec-value">${car.specs.torque}</div>
                </div>
                <div class="modal-spec">
                    <div class="modal-spec-label">百公里加速</div>
                    <div class="modal-spec-value">${car.specs.acceleration}</div>
                </div>
                <div class="modal-spec">
                    <div class="modal-spec-label">变速箱</div>
                    <div class="modal-spec-value">${car.specs.transmission}</div>
                </div>
                <div class="modal-spec">
                    <div class="modal-spec-label">驱动方式</div>
                    <div class="modal-spec-value">${car.specs.drive}</div>
                </div>
            `;

            document.getElementById('carModal').style.display = 'flex';
            document.getElementById('contactForm').style.display = 'none';
            document.body.style.overflow = 'hidden';
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('carModal').style.display = 'none';
            document.body.style.overflow = 'auto';
            currentCar = null;
        }

        // 导航链接平滑滚动
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const targetId = this.getAttribute('href');
                const target = document.querySelector(targetId);
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });
    </script>
</body>
</html>
